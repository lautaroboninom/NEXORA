name: nexora

services:
  postgres:
    image: postgres:16
    container_name: nexora-postgres
    env_file: .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: nexora-api
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "python manage.py migrate --noinput && \
      python manage.py apply_ticket_sale_states_schema && \
      python manage.py apply_no_se_repara_schema && \
      python manage.py apply_delivery_orders_schema && \
      python manage.py apply_route_sheet_schema && \
      python manage.py apply_bejerman_purchase_entries_schema && \
      python manage.py apply_bejerman_user_credentials_schema && \
      python manage.py apply_bejerman_pdf_settings_schema && \
      python manage.py apply_customer_bejerman_schema && \
      python manage.py apply_customer_alias_schema --seed-examples && \
      python manage.py apply_bejerman_sale_items_schema && \
      python manage.py apply_notifications_schema && \
      python manage.py apply_assignment_requests_schema && \
      python manage.py collectstatic --noinput && \
      gunicorn app.wsgi:application -w 3 -k gthread --threads 8 -b 0.0.0.0:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
      - type: bind
        source: "${BEJERMAN_PDF_WINDOWS_Z_HOST_DIR:-Z:/}"
        target: ${BEJERMAN_PDF_WINDOWS_Z_CONTAINER_DIR:-/mnt/nexora-z}
      - type: bind
        source: "C:/trazabilidad_general"
        target: /trazabilidad
        read_only: true
    restart: unless-stopped

  bejerman-sync:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: nexora-bejerman-sync
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=app.settings_prod
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "python manage.py apply_bejerman_user_credentials_schema && \
      python manage.py apply_customer_bejerman_schema && \
      python manage.py apply_customer_alias_schema --seed-examples && \
      python manage.py apply_bejerman_sync_schema && \
      python manage.py apply_bejerman_sale_items_schema && \
      python manage.py run_bejerman_sync_loop --interval 30 --limit 10"
    restart: unless-stopped

  web:
    profiles:
      - dev

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=
        - VITE_SOURCEMAP=${VITE_SOURCEMAP:-1}
        - VITE_SW=${VITE_SW:-1}
    container_name: nexora-web
    command: ["/usr/local/bin/start-nginx.sh"]
    environment:
      - TZ=${TZ:-America/Argentina/Buenos_Aires}
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - staticfiles:/static:ro
      - ${SEPID_CERTS_DIR:-C:/sepid_certs}:/etc/nginx/certs:ro
    restart: unless-stopped

  nginx:
    profiles:
      - dev

volumes:
  pg_data:
    external: true
    name: sistemadereparaciones_pg_data
  staticfiles:
    external: true
    name: sistemadereparaciones_staticfiles
  mediafiles:
    external: true
    name: sistemadereparaciones_mediafiles



