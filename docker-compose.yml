name: nexora-dev

services:
  postgres:
    image: postgres:16
    env_file: ./.env
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - ./.env
    environment:
      - DB_VENDOR=postgresql
      - POSTGRES_HOST=postgres
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5175}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL:-http://localhost:5175}
      - LOGO_PATH=${LOGO_PATH:-/app/staticfiles/branding/logo-app.png}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "18100:8000"
    volumes:
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
    command: >
      bash -lc "
      until python manage.py migrate --noinput; do
        echo 'Waiting for database... retrying in 2s';
        sleep 2;
      done &&
      python manage.py apply_ticket_sale_states_schema &&
      python manage.py apply_delivery_orders_schema &&
      python manage.py apply_bejerman_purchase_entries_schema &&
      python manage.py apply_bejerman_user_credentials_schema &&
      python manage.py apply_customer_bejerman_schema &&
      python manage.py apply_customer_alias_schema --seed-examples &&
      python manage.py apply_notifications_schema &&
      python manage.py apply_assignment_requests_schema &&
      python manage.py seed_dev_minimo &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:18100}
      - VITE_SW=${VITE_SW:-0}
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      api:
        condition: service_started

volumes:
  pg_data:
    external: true
    name: sistemadereparaciones-dev_pg_data
