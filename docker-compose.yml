name: nexora-dev

services:
  postgres:
    image: postgres:16
    env_file: ./.env
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -q"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - ./.env
    environment:
      - DB_VENDOR=postgresql
      - POSTGRES_HOST=postgres
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5175}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL:-http://localhost:5175}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_DEV_ALLOWED_HOSTS:-localhost,127.0.0.1,api,100.91.53.60,nexora.tail7bb880.ts.net}
      - LOGO_PATH=${LOGO_PATH:-/app/staticfiles/branding/logo-app.png}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "18100:8000"
    volumes:
      - type: bind
        source: ${QUOTES_HOST_DIR:-./quotes}
        target: /quotes
      - type: bind
        source: ${REPUESTOS_COSTOS_HOST_DIR:-./repuestos}
        target: /repuestos
        read_only: true
      - type: bind
        source: "${BEJERMAN_PDF_WINDOWS_Z_HOST_DIR:-Z:/}"
        target: ${BEJERMAN_PDF_WINDOWS_Z_CONTAINER_DIR:-/mnt/nexora-z}
    command: >
      bash -lc "
      until python manage.py migrate --noinput; do
        echo 'Waiting for database... retrying in 2s';
        sleep 2;
      done &&
      python manage.py apply_ticket_sale_states_schema &&
      python manage.py apply_no_se_repara_schema &&
      python manage.py apply_delivery_orders_schema &&
      python manage.py apply_route_sheet_schema &&
      python manage.py apply_bejerman_purchase_entries_schema &&
      python manage.py apply_bejerman_user_credentials_schema &&
      python manage.py apply_bejerman_pdf_settings_schema &&
      python manage.py apply_customer_bejerman_schema &&
      python manage.py apply_customer_alias_schema --seed-examples &&
      python manage.py apply_bejerman_sale_items_schema &&
      python manage.py apply_notifications_schema &&
      python manage.py apply_assignment_requests_schema &&
      python manage.py seed_dev_minimo &&
      gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "

  web:
    build: ./web
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=${DEV_VITE_API_URL:-}
      - VITE_DEV_API_PROXY=${VITE_DEV_API_PROXY:-http://api:8000}
      - VITE_SW=${VITE_SW:-0}
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      api:
        condition: service_started

  dev_https:
    build:
      context: .
      dockerfile: deploy/dev-https.Dockerfile
    ports:
      - "5176:5176"
    volumes:
      - ${SEPID_CERTS_DIR:-C:/sepid_certs}:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started

volumes:
  pg_data:
    external: true
    name: sistemadereparaciones-dev_pg_data
