events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream nexora_dev_web {
    server web:5173;
  }

  upstream nexora_dev_api {
    server api:8000;
  }

  server {
    listen 5176 ssl;
    server_name nexora.tail7bb880.ts.net;

    ssl_certificate /etc/nginx/certs/nexora.tail7bb880.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/nexora.tail7bb880.ts.net.key;

    client_max_body_size 50m;

    location /api/ {
      proxy_pass http://nexora_dev_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass http://nexora_dev_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300s;
    }
  }
}
